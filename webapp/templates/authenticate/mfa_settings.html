{% extends 'layout.html' %}

{% block body %}
<div class="container">
    <div class="jumbotron">
        {% include 'includes/_messages.html' %}
        <h3>Financial MFA Settings</h3>
        <p class="text-muted">SCAC: {{ settings.scac_code }}</p>
        <form method="POST" action="">
            <div class="form-group form-check">
                <input class="form-check-input" type="checkbox" id="financial_mfa_required" name="financial_mfa_required" {% if settings.financial_mfa_required %}checked{% endif %}>
                <label class="form-check-label" for="financial_mfa_required">Require MFA for financial pages</label>
            </div>
            <div class="form-group">
                <label for="timeout_minutes">Verification timeout minutes</label>
                <input class="form-control" id="timeout_minutes" name="timeout_minutes" type="number" min="15" max="1440" value="{{ settings.timeout_minutes or 720 }}">
            </div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
    </div>
</div>
{% endblock %}
