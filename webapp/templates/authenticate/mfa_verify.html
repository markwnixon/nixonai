{% extends 'layout.html' %}

{% block body %}
<div class="container">
    <div class="jumbotron">
        {% include 'includes/_messages.html' %}
        <h3>Financial MFA Verification</h3>
        <p class="text-muted">A six digit code will be sent to the email address on your user account.</p>
        <form method="POST" action="">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="form-group">
                <label for="code">Six digit email code</label>
                <input class="form-control" id="code" name="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary">Verify</button>
        </form>
        <form method="POST" action="" class="mt-3">
            <input type="hidden" name="next" value="{{ next_url }}">
            <input type="hidden" name="resend_code" value="1">
            <button type="submit" class="btn btn-outline-secondary">Send New Code</button>
        </form>
    </div>
</div>
{% endblock %}
