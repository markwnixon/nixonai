{% extends 'layout.html' %}

{% block body %}
<div class="container">
    <div class="jumbotron">
        {% include 'includes/_messages.html' %}
        <h3>Set Up Financial MFA</h3>
        <p class="text-muted">SCAC: {{ user_mfa.scac_code }}</p>
        <div class="form-group">
            <label>Authenticator Secret</label>
            <input class="form-control" readonly value="{{ user_mfa.totp_secret }}">
        </div>
        <div class="form-group">
            <label>Authenticator URI</label>
            <textarea class="form-control" rows="3" readonly>{{ otpauth_uri }}</textarea>
        </div>
        <form method="POST" action="">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="form-group">
                <label for="code">Six digit code</label>
                <input class="form-control" id="code" name="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary">Verify and Enable</button>
        </form>
        <form method="POST" action="" class="mt-3">
            <input type="hidden" name="next" value="{{ next_url }}">
            <input type="hidden" name="reset_secret" value="1">
            <button type="submit" class="btn btn-outline-secondary">Generate New Secret</button>
        </form>
    </div>
</div>
{% endblock %}
