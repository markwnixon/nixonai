{% extends 'layout.html' %}

{% block body %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dispatch_planning_calendar.css') }}">

<div class="dispatch-calendar-page"
     data-events-url="{{ url_for('main.DispatchCalendarEvents') }}"
     data-capacity-url="{{ url_for('main.DispatchCalendarCapacity') }}"
     data-move-url-template="{{ url_for('main.DispatchCalendarMove', order_id=0) }}"
     data-update-url-template="{{ url_for('main.DispatchCalendarUpdate', order_id=0) }}">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
        <div>
            <h3 class="mb-1">Dispatch Planning Calendar</h3>
            <div class="text-muted">Capacity planning for {{ scac }} container deliveries</div>
        </div>
        <div id="dispatch-calendar-message" class="alert d-none mb-0 py-2"></div>
    </div>

    <div class="dispatch-filter-bar mb-3">
        <div class="form-row align-items-end">
            <div class="form-group col-md-2">
                <label for="dispatch-filter-driver">Driver</label>
                <select id="dispatch-filter-driver" class="form-control form-control-sm dispatch-filter">
                    <option value="">All drivers</option>
                    {% for driver in options.drivers %}
                        <option value="{{ driver.Name }}">{{ driver.Name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group col-md-2">
                <label for="dispatch-filter-customer">Customer</label>
                <select id="dispatch-filter-customer" class="form-control form-control-sm dispatch-filter">
                    <option value="">All customers</option>
                    {% for customer in options.customers %}
                        <option value="{{ customer }}">{{ customer }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group col-md-2">
                <label for="dispatch-filter-status">Status</label>
                <select id="dispatch-filter-status" class="form-control form-control-sm dispatch-filter">
                    <option value="">All statuses</option>
                    {% for status in options.statuses %}
                        <option value="{{ status }}">{{ status }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group col-md-2">
                <label for="dispatch-filter-terminal">Terminal/Port</label>
                <select id="dispatch-filter-terminal" class="form-control form-control-sm dispatch-filter">
                    <option value="">All terminals</option>
                    {% for terminal in options.terminals %}
                        <option value="{{ terminal }}">{{ terminal }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group col-md-2">
                <label for="dispatch-filter-range">Range</label>
                <select id="dispatch-filter-range" class="form-control form-control-sm dispatch-filter">
                    <option value="calendar">Calendar range</option>
                    <option value="today">Today</option>
                    <option value="7">Next 7 days</option>
                    <option value="30">Next 30 days</option>
                    <option value="all">All active</option>
                </select>
            </div>
            <div class="form-group col-md-2">
                <label for="dispatch-filter-search">Container / Booking</label>
                <input id="dispatch-filter-search" class="form-control form-control-sm dispatch-filter" type="search" placeholder="Container, booking, JO">
            </div>
        </div>
    </div>

    <div class="dispatch-calendar-legend mb-3">
        <span><i class="dispatch-legend-swatch dispatch-unpulled"></i>Unpulled</span>
        <span><i class="dispatch-legend-swatch dispatch-pulled"></i>Pulled</span>
        <span><i class="dispatch-legend-swatch dispatch-returned"></i>Returned</span>
        <span><i class="dispatch-legend-outline dispatch-lfd-near"></i>LFD near</span>
        <span><i class="dispatch-legend-outline dispatch-lfd-past"></i>LFD passed</span>
    </div>

    <div id="dispatch-capacity-strip" class="dispatch-capacity-strip mb-3"></div>
    <div id="dispatch-calendar"></div>
</div>

<div class="modal fade" id="dispatch-event-modal" tabindex="-1" role="dialog" aria-labelledby="dispatch-event-modal-title" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <form id="dispatch-event-form">
                <div class="modal-header">
                    <h5 class="modal-title" id="dispatch-event-modal-title">Dispatch Job</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="dispatch-modal-order-id">
                    <div class="dispatch-job-summary mb-3" id="dispatch-modal-summary"></div>
                    <div class="form-row">
                        <div class="form-group col-md-3">
                            <label for="dispatch-modal-date">Scheduled Date</label>
                            <input type="date" class="form-control" id="dispatch-modal-date" required>
                        </div>
                        <div class="form-group col-md-3">
                            <label for="dispatch-modal-time">Scheduled Time</label>
                            <input type="time" class="form-control" id="dispatch-modal-time">
                        </div>
                        <div class="form-group col-md-3">
                            <label for="dispatch-modal-driver">Driver</label>
                            <select class="form-control" id="dispatch-modal-driver">
                                <option value="">Unassigned</option>
                                {% for driver in options.drivers %}
                                    <option value="{{ driver.Name }}">{{ driver.Name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group col-md-3">
                            <label for="dispatch-modal-truck">Truck</label>
                            <select class="form-control" id="dispatch-modal-truck">
                                <option value="">Unassigned</option>
                                {% for truck in options.trucks %}
                                    <option value="{{ truck.Unit }}">{{ truck.Unit }}{% if truck.Type %} - {{ truck.Type }}{% endif %}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-4">
                            <label for="dispatch-modal-status">Status</label>
                            <input type="text" class="form-control" id="dispatch-modal-status">
                        </div>
                        <div class="form-group col-md-8">
                            <label for="dispatch-modal-notes">Planning Notes</label>
                            <textarea class="form-control" id="dispatch-modal-notes" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Dispatch Plan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="{{ url_for('static', filename='js/dispatch_planning_calendar.js') }}"></script>
{% endblock %}
